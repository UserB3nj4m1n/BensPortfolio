name: Deploy Portfolio

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bens-portfolio:latest

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: devops
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest image from registry
            docker pull ghcr.io/${{ github.repository_owner }}/bens-portfolio:latest
            # Stop and remove old container
            docker stop portfolio || true
            docker rm portfolio || true
            # Run new container
            docker run -d --name portfolio -p 8081:80 --restart unless-stopped ghcr.io/${{ github.repository_owner }}/bens-portfolio:latest