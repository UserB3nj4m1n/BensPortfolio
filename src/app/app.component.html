<div class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <!-- Navbar -->
  <nav [ngClass]="{'shadow-md bg-white/80 dark:bg-gray-900/80 backdrop-blur-md': isScrolled(), 'bg-transparent py-4': !isScrolled()}" 
       class="fixed w-full z-50 top-0 transition-all duration-300 px-6 py-3">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="#" (click)="$event.preventDefault(); scrollTo('home')" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400">
        Benjamín Baričiak
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center space-x-8">
        <button (click)="scrollTo('about')" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">About</button>
        <button (click)="scrollTo('experience')" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Experience</button>
        <button (click)="scrollTo('skills')" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Skills</button>
        <button (click)="scrollTo('contact')" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Contact</button>
        
        <!-- Theme Toggle -->
        <button (click)="themeService.toggleTheme()" 
                class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors"
                [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
          @if (themeService.isDarkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          }
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden flex items-center gap-4">
        <button (click)="themeService.toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
          @if (themeService.isDarkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
          }
        </button>
        <button (click)="toggleMenu()" class="text-gray-600 dark:text-gray-300 focus:outline-none">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (isMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            }
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Nav -->
    @if (isMenuOpen()) {
      <div class="md:hidden mt-4 pb-4 space-y-2 bg-white dark:bg-gray-900 rounded-lg shadow-lg p-4">
        <button (click)="scrollTo('about')" class="block w-full text-left py-2 hover:text-blue-600 dark:hover:text-blue-400">About</button>
        <button (click)="scrollTo('experience')" class="block w-full text-left py-2 hover:text-blue-600 dark:hover:text-blue-400">Experience</button>
        <button (click)="scrollTo('skills')" class="block w-full text-left py-2 hover:text-blue-600 dark:hover:text-blue-400">Skills</button>
        <button (click)="scrollTo('contact')" class="block w-full text-left py-2 hover:text-blue-600 dark:hover:text-blue-400">Contact</button>
      </div>
    }
  </nav>

  <!-- Main Content Sections -->
  <main>
    <section id="home" class="min-h-screen flex items-center justify-center pt-20">
      <app-hero class="w-full"></app-hero>
    </section>

    <!-- We use id 'about' and 'experience' mapped appropriately depending on how components are structured -->
    <section id="experience" class="py-20 bg-white dark:bg-gray-800/50">
      <app-experience class="w-full"></app-experience>
    </section>

    <section id="skills" class="py-20">
      <app-skills class="w-full"></app-skills>
    </section>

    <section id="contact" class="py-20 bg-white dark:bg-gray-800/50">
      <app-contact class="w-full"></app-contact>
    </section>
  </main>

  <footer class="py-8 text-center text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-800">
    <p>&copy; 2024 Benjamín Baričiak. All rights reserved.</p>
  </footer>
</div>
