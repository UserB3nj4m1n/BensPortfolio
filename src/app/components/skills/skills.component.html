<div class="max-w-4xl mx-auto px-6">
  <div class="text-center mb-16">
    <h2 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500 inline-block mb-4">
      {{ languageService.t().SKILLS_TITLE }}
    </h2>
    <p class="text-gray-600 dark:text-gray-400">
      {{ languageService.t().SKILLS_DESC }}
    </p>
  </div>

  <div class="grid md:grid-cols-2 gap-12">
    @for (category of skillCategories(); track category.name) {
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg border border-gray-100 dark:border-gray-700">
        <h3 class="text-xl font-bold mb-6 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-4">
          {{ category.name }}
        </h3>
        
        <div class="flex flex-wrap gap-4">
          @for (skill of category.skills; track skill) {
            <span class="px-4 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-medium shadow-sm hover:shadow-md hover:scale-105 hover:bg-blue-50 dark:hover:bg-gray-700 transition-all duration-300 cursor-default">
              {{ skill }}
            </span>
          }
        </div>
      </div>
    }
  </div>
</div>
